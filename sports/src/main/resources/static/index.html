<!DOCTYPE html>
<html>
<head>
    <title>Sports Management Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
        }

        .container {
            width: 85%;
            margin: auto;
            padding: 30px 0;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #6366f1, #22c55e);
            color: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-weight: 600;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .card h3 {
            margin-bottom: 10px;
            color: #374151;
        }

        /* Form */
        .form input {
            padding: 10px;
            margin: 10px;
            width: 180px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .form input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 5px rgba(99,102,241,0.3);
        }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-add {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .btn-add:hover {
            transform: scale(1.05);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .btn-delete:hover {
            transform: scale(1.05);
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }

        th {
            background: #6366f1;
            color: white;
            padding: 12px;
            font-weight: 500;
        }

        td {
            padding: 10px;
            text-align: center;
            color: #374151;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:hover {
            background: #eef2ff;
        }

        /* Subtle animation */
        .card:hover {
            transform: translateY(-2px);
            transition: 0.3s;
        }

        /* Responsive */
        @media(max-width: 768px) {
            .form input {
                width: 100%;
                margin: 5px 0;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h1>🏢 Sports Dashboard</h1>
        <p>Manage athletes, track performance, and maintain records efficiently</p>
    </div>

    <!-- Form -->
    <div class="card form">
        <h3>➕ Add New Player</h3>
        <input type="text" id="name" placeholder="Enter Player Name">
        <input type="text" id="sport" placeholder="Sport Category">
        <input type="number" id="age" placeholder="Age">
        <button class="btn btn-add" onclick="addPlayer()">Add Player</button>
    </div>

    <!-- Table -->
    <div class="card">
        <h3>📋 Player Records</h3>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Player Name</th>
                <th>Sport</th>
                <th>Age</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="playerTable"></tbody>
        </table>
    </div>

</div>

<script>
    const API = "http://localhost:8082/players";

    async function loadPlayers() {
        const res = await fetch(API);
        const data = await res.json();

        let rows = "";
        data.forEach(p => {
            rows += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${p.sport}</td>
                    <td>${p.age}</td>
                    <td>
                        <button class="btn btn-delete" onclick="deletePlayer(${p.id})">Remove</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById("playerTable").innerHTML = rows;
    }

    async function addPlayer() {
        const name = document.getElementById("name").value;
        const sport = document.getElementById("sport").value;
        const age = document.getElementById("age").value;

        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, sport, age })
        });

        document.getElementById("name").value = "";
        document.getElementById("sport").value = "";
        document.getElementById("age").value = "";

        loadPlayers();
    }

    async function deletePlayer(id) {
        await fetch(`${API}/${id}`, { method: "DELETE" });
        loadPlayers();
    }

    loadPlayers();
</script>

</body>
</html>
